<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judge Evaluation Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --text: #e6edf3;
    --text-muted: #8b949e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  .title-block {
    text-align: center;
    margin-bottom: 24px;
  }
  .title-block h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .title-block h2 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .chart-wrap {
    width: 100%;
    max-width: 1100px;
  }
  .chart-wrap svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px 24px;
    margin-top: 20px;
    padding: 12px 18px;
    border: 1px solid #30363d;
    border-radius: 8px;
    background: #161b22;
    width: 100%;
    max-width: 1100px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    border: 1.5px solid;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="title-block">
  <h1>System Architecture</h1>
  <h2>Judge Evaluation Pipeline</h2>
</div>

<div class="chart-wrap">
<svg viewBox="0 0 990 580" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans', sans-serif">
  <defs>
    <marker id="a-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="a-muted" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b949e"/>
    </marker>
    <marker id="a-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="a-muted-rev" markerWidth="8" markerHeight="8" refX="1" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#8b949e"/>
    </marker>
    <linearGradient id="g-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#162318"/>
    </linearGradient>
    <linearGradient id="g-orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#231a18"/>
    </linearGradient>
  </defs>

  <!-- ── JUDGE outer box ── -->
  <rect x="160" y="20" width="640" height="530" rx="12"
        fill="#1c2330" stroke="#30363d" stroke-width="1.5"/>
  <rect x="186" y="12" width="68" height="18" rx="3" fill="#1c2330"/>
  <text x="220" y="25" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="10" font-weight="600" letter-spacing="2" fill="#58a6ff">JUDGE</text>

  <!-- ── SOURCE node (aligned with top row at y=42) ── -->
  <rect x="10" y="42" width="118" height="52" rx="8"
        fill="url(#g-blue)" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="69" y="65" text-anchor="middle" font-size="12" font-weight="500" fill="#e6edf3">Output from</text>
  <text x="69" y="81" text-anchor="middle" font-size="12" font-weight="500" fill="#e6edf3">an LLM</text>
  <text x="69" y="94" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#8b949e" letter-spacing="1">SOURCE</text>

  <!-- Source → Input: straight horizontal arrow at y=68 -->
  <line x1="128" y1="68" x2="188" y2="68" stroke="#58a6ff" stroke-width="2" marker-end="url(#a-blue)"/>

  <!-- ══ ROW 1: Input → Domain Decision ↔ Data Bank ══ -->
  <!-- Input node -->
  <rect x="190" y="42" width="104" height="52" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <text x="242" y="65" text-anchor="middle" font-size="12" font-weight="500" fill="#e6edf3">Input</text>
  <text x="242" y="82" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#8b949e" letter-spacing="1">ENTRY</text>

  <!-- Input → Domain Decision -->
  <line x1="294" y1="68" x2="326" y2="68" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a-muted)"/>

  <!-- Domain Decision node -->
  <rect x="326" y="42" width="148" height="52" rx="7" fill="#161b22" stroke="#d2a8ff" stroke-width="1.2"/>
  <text x="400" y="65" text-anchor="middle" font-size="12" font-weight="500" fill="#e6edf3">Domain Decision</text>
  <text x="400" y="82" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#8b949e" letter-spacing="1">ROUTER</text>

  <!-- Domain Decision ↔ Data Bank (top=right, bottom=left) -->
  <line x1="474" y1="60" x2="518" y2="60" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a-muted)"/>
  <line x1="518" y1="76" x2="474" y2="76" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a-muted)"/>

  <!-- Data Bank node -->
  <rect x="518" y="42" width="126" height="52" rx="7" fill="#161b22" stroke="#d2a8ff" stroke-width="1.2"/>
  <text x="581" y="65" text-anchor="middle" font-size="12" font-weight="500" fill="#e6edf3">Data Bank</text>
  <text x="581" y="82" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#8b949e" letter-spacing="1">KNOWLEDGE</text>

  <!-- Domain Decision → down to Rubric -->
  <line x1="400" y1="94" x2="400" y2="128" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a-muted)"/>

  <!-- ══ RUBRIC BOX ══ -->
  <rect x="175" y="128" width="610" height="148" rx="8"
        fill="none" stroke="#30363d" stroke-width="1.2" stroke-dasharray="6 3"/>
  <rect x="195" y="121" width="58" height="16" rx="3" fill="#1c2330"/>
  <text x="224" y="133" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="9" font-weight="600" letter-spacing="1.5" fill="#8b949e">RUBRIC</text>

  <!-- Benchmarks node -->
  <rect x="188" y="148" width="118" height="40" rx="6" fill="#161b22" stroke="#6e40c9" stroke-width="1.2"/>
  <text x="247" y="165" text-anchor="middle" font-size="11" font-weight="500" fill="#e6edf3">Benchmarks</text>
  <rect x="262" y="170" width="28" height="12" rx="3" fill="#6e40c922" stroke="#6e40c966" stroke-width="0.8"/>
  <text x="276" y="179.5" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7.5" fill="#d2a8ff">REF</text>

  <!-- Context Information node -->
  <rect x="188" y="208" width="118" height="52" rx="6" fill="#161b22" stroke="#6e40c9" stroke-width="1.2"/>
  <text x="247" y="230" text-anchor="middle" font-size="10.5" font-weight="500" fill="#e6edf3">Context</text>
  <text x="247" y="245" text-anchor="middle" font-size="10.5" font-weight="500" fill="#e6edf3">Information</text>
  <rect x="226" y="252" width="42" height="12" rx="3" fill="#6e40c922" stroke="#6e40c966" stroke-width="0.8"/>
  <text x="247" y="261.5" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7.5" fill="#d2a8ff">CONTEXT</text>

  <!-- Benchmarks/Context → Eval Pipeline -->
  <line x1="306" y1="168" x2="342" y2="192" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a-muted)"/>
  <line x1="306" y1="234" x2="338" y2="206" stroke="#8b949e" stroke-width="1.5"/>

  <!-- Evaluation Pipeline node -->
  <rect x="342" y="168" width="148" height="68" rx="7" fill="#161b22" stroke="#8b949e" stroke-width="1.2"/>
  <text x="416" y="197" text-anchor="middle" font-size="12" font-weight="500" fill="#e6edf3">Evaluation</text>
  <text x="416" y="213" text-anchor="middle" font-size="12" font-weight="500" fill="#e6edf3">Pipeline</text>
  <text x="416" y="228" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#8b949e" letter-spacing="1">PROCESSING</text>

  <!-- Eval Pipeline → Eval+CoD -->
  <line x1="490" y1="202" x2="518" y2="202" stroke="#58a6ff" stroke-width="1.8" marker-end="url(#a-blue)"/>

  <!-- Eval + Chain of Density node -->
  <rect x="518" y="158" width="252" height="88" rx="7"
        fill="url(#g-blue)" stroke="#58a6ff" stroke-width="1.5"/>
  <rect x="518" y="158" width="252" height="88" rx="7"
        fill="none" stroke="#58a6ff" stroke-width="3" opacity="0.1"/>
  <text x="644" y="193" text-anchor="middle" font-size="12" font-weight="500" fill="#e6edf3">Evaluation +</text>
  <text x="644" y="210" text-anchor="middle" font-size="12" font-weight="500" fill="#e6edf3">Chain of Density</text>
  <rect x="619" y="220" width="50" height="14" rx="4" fill="#1f6feb44" stroke="#1f6feb66" stroke-width="0.8"/>
  <text x="644" y="230" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#58a6ff">CORE</text>

  <!-- ══ BOTTOM ROW: New Prompt → Piecewise A/B → New Output ══ -->
  <!-- New Prompt to LLM -->
  <rect x="188" y="350" width="124" height="64" rx="7" fill="#161b22" stroke="#8b949e" stroke-width="1.2"/>
  <text x="250" y="375" text-anchor="middle" font-size="11" font-weight="500" fill="#e6edf3">New Prompt</text>
  <text x="250" y="391" text-anchor="middle" font-size="11" font-weight="500" fill="#e6edf3">to LLM</text>
  <text x="250" y="407" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#8b949e" letter-spacing="1">RETRY</text>

  <!-- Fork: New Prompt → Piecewise A and B -->
  <line x1="312" y1="382" x2="344" y2="382" stroke="#8b949e" stroke-width="1.5"/>
  <line x1="344" y1="382" x2="344" y2="358" stroke="#8b949e" stroke-width="1.5"/>
  <line x1="344" y1="358" x2="368" y2="358" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a-muted)"/>
  <line x1="344" y1="382" x2="344" y2="406" stroke="#8b949e" stroke-width="1.5"/>
  <line x1="344" y1="406" x2="368" y2="406" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a-muted)"/>

  <!-- Piecewise A -->
  <rect x="368" y="340" width="122" height="36" rx="6" fill="url(#g-orange)" stroke="#f78166" stroke-width="1.2"/>
  <text x="429" y="363" text-anchor="middle" font-size="11" font-weight="500" fill="#e6edf3">Piecewise A</text>

  <!-- Piecewise B -->
  <rect x="368" y="388" width="122" height="36" rx="6" fill="url(#g-orange)" stroke="#f78166" stroke-width="1.2"/>
  <text x="429" y="411" text-anchor="middle" font-size="11" font-weight="500" fill="#e6edf3">Piecewise B</text>

  <!-- Merge: A+B → New Output -->
  <line x1="490" y1="358" x2="522" y2="358" stroke="#8b949e" stroke-width="1.5"/>
  <line x1="522" y1="358" x2="522" y2="382" stroke="#8b949e" stroke-width="1.5"/>
  <line x1="490" y1="406" x2="522" y2="406" stroke="#8b949e" stroke-width="1.5"/>
  <line x1="522" y1="406" x2="522" y2="382" stroke="#8b949e" stroke-width="1.5"/>
  <line x1="522" y1="382" x2="548" y2="382" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a-muted)"/>

  <!-- New Output node -->
  <rect x="548" y="354" width="122" height="56" rx="7" fill="#161b22" stroke="#8b949e" stroke-width="1.2"/>
  <text x="609" y="379" text-anchor="middle" font-size="11" font-weight="500" fill="#e6edf3">New Output</text>
  <text x="609" y="397" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#8b949e" letter-spacing="1">GENERATED</text>

  <!-- Curved feedback: New Output ↑ → Eval+CoD -->
  <path d="M 670 354 C 670 310 660 260 644 246" stroke="#58a6ff" stroke-width="1.8"
        fill="none" stroke-dasharray="5 3" marker-end="url(#a-blue)" opacity="0.85"/>

  <!-- Curved feedback: New Prompt ← Rubric area -->
  <path d="M 188 382 C 168 382 168 202 247 202 C 300 202 320 192 340 185"
        stroke="#8b949e" stroke-width="1.4" fill="none" stroke-dasharray="4 3"
        marker-end="url(#a-muted)" opacity="0.55"/>

  <!-- Source node connects into judge at row 1 via vertical path (already drawn above) -->
  <!-- The source node is at y=260-320, connects horizontally then up to Input at y=42-94 -->

  <!-- ── Eval+CoD → Final Output (right side) ── -->
  <line x1="770" y1="202" x2="848" y2="202" stroke="#3fb950" stroke-width="1.8" marker-end="url(#a-green)"/>

  <!-- ── FINAL OUTPUT node (outside judge box) ── -->
  <rect x="854" y="162" width="120" height="80" rx="8"
        fill="url(#g-green)" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="854" y="162" width="120" height="80" rx="8"
        fill="none" stroke="#3fb950" stroke-width="3" opacity="0.1"/>
  <text x="914" y="193" text-anchor="middle" font-size="11" font-weight="500" fill="#e6edf3">Evaluation +</text>
  <text x="914" y="209" text-anchor="middle" font-size="11" font-weight="500" fill="#e6edf3">Final Output</text>
  <text x="914" y="233" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#8b949e" letter-spacing="1">RESULT</text>

</svg>
</div>

<div class="legend">
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#58a6ff;"></div>
    Primary data flow
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#d2a8ff;"></div>
    Knowledge / context
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#f78166;"></div>
    Piecewise outputs
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#3fb950;"></div>
    Final result
  </div>
  <div class="legend-item">
    <svg width="24" height="8" style="flex-shrink:0">
      <line x1="0" y1="4" x2="17" y2="4" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="3 2"/>
      <polygon points="15,1 22,4 15,7" fill="#58a6ff"/>
    </svg>
    Feedback loop
  </div>
</div>

</body>
</html>
