<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoring Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #f78166;
    --accent4: #d2a8ff;
    --text: #e6edf3;
    --text-muted: #8b949e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .title-block {
    text-align: center;
    margin-bottom: 32px;
  }
  .title-block h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .title-block h2 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .chart-wrap {
    width: 100%;
    max-width: 560px;
  }
  .chart-wrap svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 22px;
    margin-top: 20px;
    padding: 12px 18px;
    border: 1px solid #30363d;
    border-radius: 8px;
    background: #161b22;
    width: 100%;
    max-width: 560px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    border: 1.5px solid;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="title-block">
  <h1>Judge Evaluation Pipeline</h1>
  <h2>Scoring Formula</h2>
</div>

<div class="chart-wrap">
<svg viewBox="0 0 480 660" xmlns="http://www.w3.org/2000/svg"
     font-family="'IBM Plex Sans', sans-serif">
  <defs>
    <!-- Arrow markers -->
    <marker id="a-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="a-muted" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b949e"/>
    </marker>
    <marker id="a-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="a-orange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f78166"/>
    </marker>
    <marker id="a-purple" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d2a8ff"/>
    </marker>

    <!-- Gradients -->
    <linearGradient id="g-source" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="g-rubric" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1d1f2e"/>
    </linearGradient>
    <linearGradient id="g-baseline" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1e2218"/>
    </linearGradient>
    <linearGradient id="g-hybrid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#221a18"/>
    </linearGradient>
    <linearGradient id="g-final" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#162318"/>
      <stop offset="100%" stop-color="#1a2e1a"/>
    </linearGradient>
  </defs>

  <!-- ════════════════════════════════════
       NODE 1 — LLM Output (SOURCE)
  ════════════════════════════════════ -->
  <rect x="140" y="20" width="200" height="64" rx="9"
        fill="url(#g-source)" stroke="#58a6ff" stroke-width="1.6"/>
  <!-- subtle inner glow -->
  <rect x="140" y="20" width="200" height="64" rx="9"
        fill="none" stroke="#58a6ff" stroke-width="4" opacity="0.07"/>
  <text x="240" y="48" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">LLM Output</text>
  <text x="240" y="72" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" letter-spacing="1.5" fill="#8b949e">SOURCE</text>

  <!-- Arrow 1→2 -->
  <line x1="240" y1="84" x2="240" y2="116" stroke="#58a6ff" stroke-width="2" marker-end="url(#a-blue)"/>

  <!-- ════════════════════════════════════
       NODE 2 — Rubric Score (C)
  ════════════════════════════════════ -->
  <rect x="130" y="118" width="220" height="76" rx="9"
        fill="url(#g-rubric)" stroke="#d2a8ff" stroke-width="1.4"/>
  <text x="240" y="148" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">Rubric Score</text>
  <!-- formula pill -->
  <rect x="206" y="157" width="68" height="20" rx="5"
        fill="#d2a8ff18" stroke="#d2a8ff44" stroke-width="0.8"/>
  <text x="240" y="171" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="10" font-weight="600" fill="#d2a8ff">C</text>
  <text x="240" y="185" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" letter-spacing="1.5" fill="#8b949e">CLASSIFIER</text>

  <!-- Arrow 2→3 -->
  <line x1="240" y1="194" x2="240" y2="226" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a-muted)"/>

  <!-- ════════════════════════════════════
       NODE 3 — Weighted Baseline (M)
  ════════════════════════════════════ -->
  <rect x="130" y="228" width="220" height="76" rx="9"
        fill="url(#g-baseline)" stroke="#3fb950" stroke-width="1.4"/>
  <text x="240" y="257" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">Weighted Baseline</text>
  <rect x="205" y="265" width="70" height="20" rx="5"
        fill="#3fb95018" stroke="#3fb95044" stroke-width="0.8"/>
  <text x="240" y="279" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="10" font-weight="600" fill="#3fb950">M</text>
  <text x="240" y="295" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" letter-spacing="1.5" fill="#8b949e">METRIC</text>

  <!-- Arrow 3→4 -->
  <line x1="240" y1="304" x2="240" y2="336" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a-muted)"/>

  <!-- ════════════════════════════════════
       NODE 4 — Hybrid Score
  ════════════════════════════════════ -->
  <!-- outer wrapper / emphasis ring -->
  <rect x="108" y="338" width="264" height="100" rx="10"
        fill="none" stroke="#f78166" stroke-width="1" stroke-dasharray="5 3" opacity="0.5"/>

  <rect x="118" y="348" width="244" height="80" rx="8"
        fill="url(#g-hybrid)" stroke="#f78166" stroke-width="1.5"/>
  <rect x="118" y="348" width="244" height="80" rx="8"
        fill="none" stroke="#f78166" stroke-width="4" opacity="0.06"/>

  <text x="240" y="372" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">Hybrid Score</text>

  <!-- formula box -->
  <rect x="164" y="380" width="152" height="26" rx="5"
        fill="#f7816614" stroke="#f7816644" stroke-width="0.8"/>
  <text x="240" y="398" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="11" font-weight="600" fill="#f78166">S = 0.7C + 0.3M</text>
  <text x="240" y="422" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" letter-spacing="1.5" fill="#8b949e">WEIGHTED COMBINATION</text>

  <!-- connector label from C side -->
  <line x1="148" y1="268" x2="148" y2="388" stroke="#d2a8ff" stroke-width="1" stroke-dasharray="3 3" opacity="0.35"/>
  <line x1="148" y1="388" x2="164" y2="388" stroke="#d2a8ff" stroke-width="1" stroke-dasharray="3 3" opacity="0.35"/>
  <text x="102" y="334" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" fill="#d2a8ff" opacity="0.7">0.7</text>

  <!-- connector label from M side -->
  <line x1="332" y1="268" x2="332" y2="388" stroke="#3fb950" stroke-width="1" stroke-dasharray="3 3" opacity="0.35"/>
  <line x1="316" y1="388" x2="332" y2="388" stroke="#3fb950" stroke-width="1" stroke-dasharray="3 3" opacity="0.35"/>
  <text x="376" y="334" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" fill="#3fb950" opacity="0.7">0.3</text>

  <!-- Arrow 4→5 -->
  <line x1="240" y1="438" x2="240" y2="472" stroke="#3fb950" stroke-width="2" marker-end="url(#a-green)"/>

  <!-- ════════════════════════════════════
       NODE 5 — Hallucination Penalty
  ════════════════════════════════════ -->
  <!-- outer glow box -->
  <rect x="100" y="474" width="280" height="114" rx="11"
        fill="#162318" stroke="#3fb950" stroke-width="1.8"/>
  <rect x="100" y="474" width="280" height="114" rx="11"
        fill="none" stroke="#3fb950" stroke-width="5" opacity="0.08"/>

  <!-- label tab -->
  <rect x="152" y="467" width="176" height="16" rx="3" fill="#162318"/>
  <text x="240" y="479" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="9" font-weight="600" letter-spacing="1.8" fill="#3fb950">HALLUCINATION PENALTY</text>

  <text x="240" y="510" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">Final Score</text>

  <!-- formula box -->
  <rect x="128" y="520" width="224" height="30" rx="6"
        fill="#3fb95014" stroke="#3fb95055" stroke-width="0.9"/>
  <text x="240" y="540" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="12" font-weight="600" fill="#3fb950">S_final = S(1 − 0.15h)</text>

  <!-- annotation: h = hallucination rate -->
  <text x="240" y="574" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8.5" fill="#8b949e">h = hallucination rate &nbsp;·&nbsp; range [0, 1]</text>

  <!-- label RESULT -->
  <text x="240" y="592" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" letter-spacing="1.5" fill="#3fb950" opacity="0.7">RESULT</text>

  <!-- ── Side annotation: weight labels ── -->
  <!-- Weight C pill -->
  <rect x="20" y="240" width="56" height="20" rx="5"
        fill="#d2a8ff18" stroke="#d2a8ff44" stroke-width="0.8"/>
  <text x="48" y="254" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8.5" font-weight="600" fill="#d2a8ff">70%</text>

  <!-- Weight M pill -->
  <rect x="404" y="240" width="56" height="20" rx="5"
        fill="#3fb95018" stroke="#3fb95044" stroke-width="0.8"/>
  <text x="432" y="254" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8.5" font-weight="600" fill="#3fb950">30%</text>

</svg>
</div>

<div class="legend">
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#58a6ff;background:#58a6ff22;"></div>
    Primary data flow
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#d2a8ff;background:#d2a8ff22;"></div>
    Rubric score (C) · weight 0.7
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#3fb950;background:#3fb95022;"></div>
    Weighted baseline (M) · weight 0.3
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#f78166;background:#f7816622;"></div>
    Hybrid combination
  </div>
</div>

</body>
</html>
