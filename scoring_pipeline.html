<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoring Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #f78166;
    --accent4: #d2a8ff;
    --text: #e6edf3;
    --text-muted: #8b949e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .title-block {
    text-align: center;
    margin-bottom: 32px;
  }
  .title-block h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .title-block h2 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .chart-wrap {
    width: 100%;
    max-width: 600px;
  }
  .chart-wrap svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 22px;
    margin-top: 20px;
    padding: 12px 18px;
    border: 1px solid #30363d;
    border-radius: 8px;
    background: #161b22;
    width: 100%;
    max-width: 600px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    border: 1.5px solid;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="title-block">
  <h1>Judge Evaluation Pipeline</h1>
  <h2>Scoring Formula</h2>
</div>

<div class="chart-wrap">
<svg viewBox="0 0 520 660" xmlns="http://www.w3.org/2000/svg"
     font-family="'IBM Plex Sans', sans-serif">
  <defs>
    <marker id="a-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="a-muted" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b949e"/>
    </marker>
    <marker id="a-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="a-orange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f78166"/>
    </marker>
    <marker id="a-purple" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d2a8ff"/>
    </marker>

    <linearGradient id="g-source" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="g-rubric" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1d1f2e"/>
    </linearGradient>
    <linearGradient id="g-baseline" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1e2218"/>
    </linearGradient>
    <linearGradient id="g-hybrid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#221a18"/>
    </linearGradient>
    <linearGradient id="g-final" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#162318"/>
      <stop offset="100%" stop-color="#1a2e1a"/>
    </linearGradient>
  </defs>

  <!-- ══════════════════════════════
       NODE 1 — LLM Output (SOURCE)
  ══════════════════════════════ -->
  <rect x="160" y="20" width="200" height="64" rx="9"
        fill="url(#g-source)" stroke="#58a6ff" stroke-width="1.6"/>
  <rect x="160" y="20" width="200" height="64" rx="9"
        fill="none" stroke="#58a6ff" stroke-width="4" opacity="0.07"/>
  <text x="260" y="46" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">LLM Output</text>
  <text x="260" y="68" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" letter-spacing="1.5" fill="#8b949e">SOURCE</text>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="84" x2="260" y2="116" stroke="#58a6ff" stroke-width="2" marker-end="url(#a-blue)"/>

  <!-- ══════════════════════════════
       NODE 2 — Rubric Score (C)
  ══════════════════════════════ -->
  <rect x="120" y="118" width="280" height="106" rx="9"
        fill="url(#g-rubric)" stroke="#d2a8ff" stroke-width="1.4"/>
  <text x="260" y="143" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">Rubric Score</text>

  <!-- Formula: C = domain_rubric -->
  <rect x="170" y="153" width="180" height="26" rx="5"
        fill="#d2a8ff14" stroke="#d2a8ff44" stroke-width="0.9"/>
  <text x="260" y="171" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="11" font-weight="600" fill="#d2a8ff">C = domain_rubric</text>

  <text x="260" y="208" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" letter-spacing="1.5" fill="#8b949e60">CLASSIFIER</text>

  <!-- Arrow 2→3 -->
  <line x1="260" y1="224" x2="260" y2="256" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a-muted)"/>

  <!-- ══════════════════════════════
       NODE 3 — Weighted Baseline (M)
  ══════════════════════════════ -->
  <rect x="60" y="258" width="400" height="96" rx="9"
        fill="url(#g-baseline)" stroke="#3fb950" stroke-width="1.4"/>
  <text x="260" y="283" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">Weighted Baseline Score</text>

  <!-- Main formula — single line -->
  <rect x="68" y="292" width="384" height="26" rx="5"
        fill="#3fb95014" stroke="#3fb95044" stroke-width="0.9"/>
  <text x="260" y="310" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="10" font-weight="600" fill="#3fb950">M = (0.8·base + 0.2·coverage − 0.1·2^hallucination)</text>

  <text x="260" y="340" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" letter-spacing="1.5" fill="#8b949e60">METRIC</text>

  <!-- Arrow 3→4 -->
  <line x1="260" y1="354" x2="260" y2="386" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a-muted)"/>

  <!-- ══════════════════════════════
       NODE 4 — Hybrid Score
  ══════════════════════════════ -->
  <rect x="98" y="388" width="324" height="90" rx="8"
        fill="url(#g-hybrid)" stroke="#f78166" stroke-width="1.5"/>
  <rect x="98" y="388" width="324" height="90" rx="8"
        fill="none" stroke="#f78166" stroke-width="4" opacity="0.06"/>

  <text x="260" y="412" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">Hybrid Score</text>

  <!-- formula box -->
  <rect x="154" y="421" width="212" height="28" rx="5"
        fill="#f7816614" stroke="#f7816644" stroke-width="0.9"/>
  <text x="260" y="440" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="12" font-weight="600" fill="#f78166">S = 0.7C + 0.3M</text>

  <text x="260" y="465" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" letter-spacing="1.5" fill="#8b949e60">WEIGHTED COMBINATION</text>

  <!-- Arrow 4→5 -->
  <line x1="260" y1="478" x2="260" y2="500" stroke="#3fb950" stroke-width="2" marker-end="url(#a-green)"/>

  <!-- ══════════════════════════════
       NODE 5 — Final Score (Hallucination Penalty)
  ══════════════════════════════ -->
  <rect x="80" y="510" width="360" height="90" rx="11"
        fill="#162318" stroke="#3fb950" stroke-width="1.8"/>
  <rect x="80" y="510" width="360" height="90" rx="11"
        fill="none" stroke="#3fb950" stroke-width="5" opacity="0.08"/>

  <!-- label tab -->
  <rect x="152" y="503" width="216" height="16" rx="3" fill="#162318"/>
  <text x="260" y="515" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="9" font-weight="600" letter-spacing="1.8" fill="#3fb950">HALLUCINATION PENALTY</text>

  <text x="260" y="540" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">Final Score</text>

  <!-- main formula -->
  <rect x="100" y="550" width="320" height="32" rx="6"
        fill="#3fb95014" stroke="#3fb95055" stroke-width="0.9"/>
  <text x="260" y="571" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="13" font-weight="600" fill="#3fb950">S_final = S · (1 − 0.15h)</text></svg>
</div>

<div class="legend">
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#58a6ff;background:#58a6ff22;"></div>
    Primary data flow
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#d2a8ff;background:#d2a8ff22;"></div>
    Rubric score (C)
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#3fb950;background:#3fb95022;"></div>
    Weighted baseline (M)
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#f78166;background:#f7816622;"></div>
    Hybrid combination (S)
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#f78166;background:#f7816622;"></div>
    Hallucination signal (h)
  </div>
</div>

</body>
</html>
