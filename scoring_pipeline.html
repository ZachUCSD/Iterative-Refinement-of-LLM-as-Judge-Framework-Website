<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoring Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #f78166;
    --accent4: #d2a8ff;
    --text: #e6edf3;
    --text-muted: #8b949e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .title-block {
    text-align: center;
    margin-bottom: 32px;
  }
  .title-block h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .title-block h2 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .chart-wrap {
    width: 100%;
    max-width: 600px;
  }
  .chart-wrap svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 22px;
    margin-top: -28px;
    padding: 12px 18px;
    border: 1px solid #30363d;
    border-radius: 8px;
    background: #161b22;
    width: 100%;
    max-width: 600px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    border: 1.5px solid;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="title-block">
  <h1>Judge Evaluation Pipeline</h1>
  <h2>Scoring Formula</h2>
</div>

<div class="chart-wrap">
<svg viewBox="0 0 520 1080" xmlns="http://www.w3.org/2000/svg"
     font-family="'IBM Plex Sans', sans-serif">
  <defs>
    <marker id="a-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="a-muted" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b949e"/>
    </marker>
    <marker id="a-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="a-orange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f78166"/>
    </marker>
    <marker id="a-purple" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d2a8ff"/>
    </marker>
    <marker id="a-yellow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e3b341"/>
    </marker>

    <linearGradient id="g-source" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/><stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="g-rubric" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/><stop offset="100%" stop-color="#1d1f2e"/>
    </linearGradient>
    <linearGradient id="g-baseline" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/><stop offset="100%" stop-color="#1e2218"/>
    </linearGradient>
    <linearGradient id="g-hybrid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/><stop offset="100%" stop-color="#221a18"/>
    </linearGradient>
    <linearGradient id="g-damp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/><stop offset="100%" stop-color="#1e1e10"/>
    </linearGradient>
    <linearGradient id="g-final" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#162318"/><stop offset="100%" stop-color="#1a2e1a"/>
    </linearGradient>
  </defs>

  <!-- NODE 1 — LLM Output -->
  <rect x="160" y="20" width="200" height="64" rx="9"
        fill="url(#g-source)" stroke="#58a6ff" stroke-width="1.6"/>
  <rect x="160" y="20" width="200" height="64" rx="9"
        fill="none" stroke="#58a6ff" stroke-width="4" opacity="0.07"/>
  <text x="260" y="46" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">LLM Output</text>
  <text x="260" y="68" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" letter-spacing="1.5" fill="#8b949e">SOURCE</text>

  <line x1="260" y1="84" x2="260" y2="116" stroke="#58a6ff" stroke-width="2" marker-end="url(#a-blue)"/>

  <!-- NODE 2 — Rubric Score (C) -->
  <rect x="120" y="118" width="280" height="88" rx="9"
        fill="url(#g-rubric)" stroke="#d2a8ff" stroke-width="1.4"/>
  <text x="260" y="143" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">Rubric Score</text>
  <rect x="170" y="153" width="180" height="26" rx="5"
        fill="#d2a8ff14" stroke="#d2a8ff44" stroke-width="0.9"/>
  <text x="260" y="171" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="11" font-weight="600" fill="#d2a8ff">C = domain_rubric</text>
  <text x="260" y="196" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" letter-spacing="1.5" fill="#8b949e60">CLASSIFIER</text>

  <line x1="260" y1="206" x2="260" y2="236" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a-muted)"/>

  <!-- NODE 3 — Weighted Baseline (M) -->
  <rect x="60" y="238" width="400" height="88" rx="9"
        fill="url(#g-baseline)" stroke="#3fb950" stroke-width="1.4"/>
  <text x="260" y="263" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">Weighted Baseline Score</text>
  <rect x="68" y="272" width="384" height="26" rx="5"
        fill="#3fb95014" stroke="#3fb95044" stroke-width="0.9"/>
  <text x="260" y="290" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="10" font-weight="600" fill="#3fb950">M = (0.8·base + 0.2·coverage) − β·2^h</text>
  <text x="260" y="316" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" letter-spacing="1.5" fill="#8b949e60">METRIC</text>

  <line x1="260" y1="326" x2="260" y2="356" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a-muted)"/>

  <!-- NODE 4 — Raw Quality -->
  <rect x="98" y="358" width="324" height="88" rx="8"
        fill="url(#g-hybrid)" stroke="#f78166" stroke-width="1.5"/>
  <rect x="98" y="358" width="324" height="88" rx="8"
        fill="none" stroke="#f78166" stroke-width="4" opacity="0.06"/>
  <text x="260" y="382" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">Raw Quality (pre-risk)</text>
  <rect x="154" y="391" width="212" height="26" rx="5"
        fill="#f7816614" stroke="#f7816644" stroke-width="0.9"/>
  <text x="260" y="409" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="12" font-weight="600" fill="#f78166">Q_raw = 0.7C + 0.3M</text>
  <text x="260" y="434" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" letter-spacing="1.5" fill="#8b949e60">WEIGHTED COMBINATION</text>

  <line x1="260" y1="446" x2="260" y2="476" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a-muted)"/>

  <!-- NODE 5 — Domain-Aware Damping -->
  <rect x="60" y="478" width="400" height="124" rx="9"
        fill="url(#g-damp)" stroke="#e3b341" stroke-width="1.4"/>
  <text x="260" y="503" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">Domain-Aware Damping</text>

  <rect x="68" y="512" width="384" height="24" rx="5"
        fill="#e3b34114" stroke="#e3b34144" stroke-width="0.9"/>
  <text x="260" y="529" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="10" font-weight="600" fill="#e3b341">α_eff = α · m_domain</text>

  <rect x="68" y="540" width="384" height="24" rx="5"
        fill="#e3b34114" stroke="#e3b34144" stroke-width="0.9"/>
  <text x="260" y="557" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="10" font-weight="600" fill="#e3b341">d_raw = 1 − α_eff · h</text>

  <rect x="68" y="568" width="384" height="24" rx="5"
        fill="#e3b34114" stroke="#e3b34144" stroke-width="0.9"/>
  <text x="260" y="585" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="10" font-weight="600" fill="#e3b341">d = clip(d_raw, 0.75, 1.0)</text>

  <text x="260" y="592" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" letter-spacing="1.5" fill="#8b949e60"></text>
  <text x="260" y="594" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" letter-spacing="1.5" fill="#8b949e60">DAMPING COEFFICIENT</text>

  <line x1="260" y1="602" x2="260" y2="632" stroke="#e3b341" stroke-width="1.8" marker-end="url(#a-yellow)"/>

  <!-- NODE 6 — Risk-Adjusted Score -->
  <rect x="98" y="634" width="324" height="88" rx="8"
        fill="url(#g-hybrid)" stroke="#f78166" stroke-width="1.5"/>
  <rect x="98" y="634" width="324" height="88" rx="8"
        fill="none" stroke="#f78166" stroke-width="4" opacity="0.06"/>
  <text x="260" y="658" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">Risk-Adjusted Score</text>
  <rect x="134" y="667" width="252" height="26" rx="5"
        fill="#f7816614" stroke="#f7816644" stroke-width="0.9"/>
  <text x="260" y="685" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="12" font-weight="600" fill="#f78166">Q_risk = Q_raw · d</text>
  <text x="260" y="710" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" letter-spacing="1.5" fill="#8b949e60">RISK ADJUSTMENT</text>

  <line x1="260" y1="722" x2="260" y2="750" stroke="#3fb950" stroke-width="2" marker-end="url(#a-green)"/>

  <!-- NODE 7 — Final Score -->
  <rect x="80" y="752" width="360" height="88" rx="11"
        fill="#162318" stroke="#3fb950" stroke-width="1.8"/>
  <rect x="80" y="752" width="360" height="88" rx="11"
        fill="none" stroke="#3fb950" stroke-width="5" opacity="0.08"/>
  <rect x="162" y="745" width="196" height="16" rx="3" fill="#162318"/>
  <text x="260" y="757" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="9" font-weight="600" letter-spacing="1.8" fill="#3fb950">FINAL SCORE</text>
  <text x="260" y="782" text-anchor="middle" font-size="13" font-weight="500" fill="#e6edf3">Stored Score</text>
  <rect x="100" y="791" width="320" height="30" rx="6"
        fill="#3fb95014" stroke="#3fb95055" stroke-width="0.9"/>
  <text x="260" y="811" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="12" font-weight="600" fill="#3fb950">final_score[0,1] = Q_risk</text>

  <!-- Policy note box -->
  <rect x="60" y="860" width="400" height="96" rx="8"
        fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <rect x="172" y="853" width="176" height="15" rx="3" fill="#0d1117"/>
  <text x="260" y="864" text-anchor="middle" font-family="'IBM Plex Mono',monospace"
        font-size="8" font-weight="600" letter-spacing="1.8" fill="#8b949e">POLICY DEFAULTS</text>
  <text x="80" y="886" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#8b949e">tuned:   α = 0.05,  β = 0.0</text>
  <text x="80" y="902" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#8b949e">legacy:  α = 0.15,  β = 0.10</text>
  <text x="80" y="918" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#8b949e">domains: stricter m_domain for engineering / math</text>
  <text x="80" y="934" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#8b949e">logs:    raw_quality_score · risk_adjusted_score · policy metadata</text>

</svg>
</div>

<div class="legend">
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#58a6ff;background:#58a6ff22;"></div>
    Primary data flow
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#d2a8ff;background:#d2a8ff22;"></div>
    Rubric score (C)
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#3fb950;background:#3fb95022;"></div>
    Weighted baseline (M)
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#f78166;background:#f7816622;"></div>
    Raw quality / risk-adjusted (Q)
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#e3b341;background:#e3b34122;"></div>
    Damping coefficient (d)
  </div>
</div>

</body>
</html>
