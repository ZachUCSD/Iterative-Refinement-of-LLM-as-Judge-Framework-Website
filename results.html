<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lecture Evaluation Metrics</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #f78166;
    --accent4: #d2a8ff;
    --text: #e6edf3;
    --text-muted: #8b949e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px 48px;
  }
  .title-block {
    text-align: center;
    margin-bottom: 36px;
  }
  .title-block h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .title-block h2 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  /* ── Grid of lecture cards ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    max-width: 1300px;
    margin: 0 auto 36px;
  }

  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px 18px;
  }

  .card-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .card-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .card-final {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .final-score {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: var(--accent2);
  }
  .stop-reason {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.08em;
    padding: 3px 7px;
    border-radius: 4px;
    border: 1px solid;
  }
  .stop-pass {
    color: var(--accent2);
    border-color: #3fb95044;
    background: #162318;
  }
  .stop-stall {
    color: var(--accent3);
    border-color: #f7816644;
    background: #231a18;
  }

  /* ── Chart SVG ── */
  .chart-area {
    position: relative;
    width: 100%;
  }
  .chart-area svg {
    width: 100%;
    height: auto;
    overflow: visible;
  }

  /* ── Summary bar ── */
  .summary {
    max-width: 1300px;
    margin: 0 auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 28px;
  }
  .summary-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .summary-row {
    display: flex;
    gap: 0;
    align-items: stretch;
    height: 32px;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }
  .summary-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    background: var(--surface);
    padding: 0 12px;
    display: flex;
    align-items: center;
    width: 78px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
  }
  .bar-track {
    flex: 1;
    background: var(--surface);
    position: relative;
    display: flex;
    align-items: center;
  }
  .bar-fill {
    height: 100%;
    position: absolute;
    left: 0;
    top: 0;
    opacity: 0.22;
  }
  .bar-value {
    position: relative;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    padding: 0 12px;
  }
  .bar-iters {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    color: var(--text-muted);
    padding-right: 12px;
    margin-left: auto;
    position: relative;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px 28px;
    margin-top: 20px;
    padding: 12px 18px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    max-width: 1300px;
    margin-left: auto;
    margin-right: auto;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    border: 1.5px solid;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="title-block">
  <h1>Judge Evaluation Pipeline</h1>
  <h2>Lecture Iteration Metrics</h2>
</div>

<div class="grid" id="grid"></div>

<div class="summary">
  <div class="summary-title">Final Scores — All Lectures</div>
  <div id="summary-rows"></div>
</div>

<div class="legend" style="margin-top:20px;">
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#58a6ff;background:#58a6ff33;"></div>
    Score (0–5)
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#d2a8ff;background:#d2a8ff33;"></div>
    Quality (0–1)
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#f78166;background:#f7816633;"></div>
    Word Count
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#3fb950;background:#3fb95033;"></div>
    pass: high quality plateau
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#f78166;background:#f7816633;"></div>
    stalled: trend plateaued
  </div>
</div>

<script>
const data = [
  {
    id: 1,
    iters: [
      { score: 4.40, quality: 0.853, words: 319 },
      { score: 4.46, quality: 0.844, words: 391 },
      { score: 4.52, quality: 0.854, words: 368 },
      { score: 4.44, quality: 0.842, words: 380 },
    ],
    finalScore: 0.7417,
    stopReason: 'pass: high quality plateau',
  },
  {
    id: 2,
    iters: [
      { score: 4.32, quality: 0.843, words: 300 },
      { score: 4.34, quality: 0.830, words: 384 },
      { score: 4.44, quality: 0.886, words: 400 },
      { score: 4.44, quality: 0.875, words: 414 },
      { score: 4.50, quality: 0.882, words: 381 },
    ],
    finalScore: 0.8576,
    stopReason: 'pass: high quality plateau',
  },
  {
    id: 3,
    iters: [
      { score: 4.32, quality: 0.762, words: 288 },
      { score: 4.40, quality: 0.802, words: 385 },
      { score: 4.40, quality: 0.766, words: 355 },
      { score: 4.34, quality: 0.789, words: 355 },
    ],
    finalScore: 0.6923,
    stopReason: 'stalled: trend plateaued',
  },
  {
    id: 4,
    iters: [
      { score: 4.38, quality: 0.820, words: 306 },
      { score: 4.30, quality: 0.811, words: 373 },
      { score: 4.28, quality: 0.810, words: 376 },
      { score: 4.42, quality: 0.827, words: 402 },
    ],
    finalScore: 0.7544,
    stopReason: 'pass: high quality plateau',
  },
  {
    id: 5,
    iters: [
      { score: 4.38, quality: 0.815, words: 306 },
      { score: 4.30, quality: 0.813, words: 386 },
      { score: 4.30, quality: 0.806, words: 379 },
      { score: 4.46, quality: 0.805, words: 375 },
    ],
    finalScore: 0.7400,
    stopReason: 'pass: high quality plateau',
  },
  {
    id: 6,
    iters: [
      { score: 4.34, quality: 0.771, words: 290 },
      { score: 4.40, quality: 0.798, words: 369 },
      { score: 4.40, quality: 0.816, words: 362 },
      { score: 4.34, quality: 0.813, words: 386 },
    ],
    finalScore: 0.7681,
    stopReason: 'pass: high quality plateau',
  },
  {
    id: 7,
    iters: [
      { score: 4.48, quality: 0.812, words: 286 },
      { score: 4.40, quality: 0.799, words: 393 },
      { score: 4.40, quality: 0.799, words: 393 },
      { score: 4.48, quality: 0.796, words: 348 },
    ],
    finalScore: 0.7610,
    stopReason: 'pass: high quality plateau',
  },
];

// ── helpers ──
const lerp = (a,b,t) => a + (b-a)*t;
const W = 380, H = 160;
const PAD_L = 36, PAD_R = 12, PAD_T = 12, PAD_B = 28;
const CW = W - PAD_L - PAD_R;
const CH = H - PAD_T - PAD_B;

function mkSVG(lec) {
  const n = lec.iters.length;
  const xs = lec.iters.map((_,i) => PAD_L + (i/(n-1||1))*CW);

  // Score axis: 4.2 – 4.6
  const scoreMin = 4.20, scoreMax = 4.60;
  const scoreY = v => PAD_T + CH - ((v - scoreMin)/(scoreMax - scoreMin))*CH;

  // Quality axis: 0.74 – 0.92
  const qualMin = 0.74, qualMax = 0.92;
  const qualY = v => PAD_T + CH - ((v - qualMin)/(qualMax - qualMin))*CH;

  // Words axis: 260 – 440
  const wMin = 260, wMax = 440;
  const wordY = v => PAD_T + CH - ((v - wMin)/(wMax - wMin))*CH;

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a-b${lec.id}" markerWidth="6" markerHeight="6" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L6,2.5 z" fill="#58a6ff"/>
    </marker>
    <linearGradient id="gS${lec.id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gQ${lec.id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d2a8ff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#d2a8ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gW${lec.id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f78166" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f78166" stop-opacity="0"/>
    </linearGradient>
  </defs>`;

  // Grid lines
  for (let i = 0; i <= 4; i++) {
    const y = PAD_T + (i/4)*CH;
    svg += `<line x1="${PAD_L}" y1="${y}" x2="${W-PAD_R}" y2="${y}" stroke="#30363d" stroke-width="0.8"/>`;
  }
  // Vertical iter lines
  xs.forEach((x,i) => {
    svg += `<line x1="${x}" y1="${PAD_T}" x2="${x}" y2="${PAD_T+CH}" stroke="#30363d" stroke-width="0.6" stroke-dasharray="2 2"/>`;
    svg += `<text x="${x}" y="${PAD_T+CH+11}" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7.5" fill="#8b949e">I${i+1}</text>`;
  });

  // ── Fill areas ──
  // Score area
  let scoreAreaPts = xs.map((x,i)=>`${x},${scoreY(lec.iters[i].score)}`).join(' ');
  let scoreAreaPath = `M${xs[0]},${PAD_T+CH} ` + xs.map((x,i)=>`L${x},${scoreY(lec.iters[i].score)}`).join(' ') + ` L${xs[xs.length-1]},${PAD_T+CH} Z`;
  svg += `<path d="${scoreAreaPath}" fill="url(#gS${lec.id})"/>`;

  // Quality area
  let qualAreaPath = `M${xs[0]},${PAD_T+CH} ` + xs.map((x,i)=>`L${x},${qualY(lec.iters[i].quality)}`).join(' ') + ` L${xs[xs.length-1]},${PAD_T+CH} Z`;
  svg += `<path d="${qualAreaPath}" fill="url(#gQ${lec.id})"/>`;

  // Words area
  let wordAreaPath = `M${xs[0]},${PAD_T+CH} ` + xs.map((x,i)=>`L${x},${wordY(lec.iters[i].words)}`).join(' ') + ` L${xs[xs.length-1]},${PAD_T+CH} Z`;
  svg += `<path d="${wordAreaPath}" fill="url(#gW${lec.id})"/>`;

  // ── Lines ──
  // Score line
  let scorePath = xs.map((x,i)=>(i===0?`M${x},${scoreY(lec.iters[i].score)}`:`L${x},${scoreY(lec.iters[i].score)}`)).join(' ');
  svg += `<path d="${scorePath}" fill="none" stroke="#58a6ff" stroke-width="1.8"/>`;

  // Quality line
  let qualPath = xs.map((x,i)=>(i===0?`M${x},${qualY(lec.iters[i].quality)}`:`L${x},${qualY(lec.iters[i].quality)}`)).join(' ');
  svg += `<path d="${qualPath}" fill="none" stroke="#d2a8ff" stroke-width="1.5" stroke-dasharray="4 2"/>`;

  // Words line
  let wordPath = xs.map((x,i)=>(i===0?`M${x},${wordY(lec.iters[i].words)}`:`L${x},${wordY(lec.iters[i].words)}`)).join(' ');
  svg += `<path d="${wordPath}" fill="none" stroke="#f78166" stroke-width="1.3" stroke-dasharray="2 3" opacity="0.8"/>`;

  // ── Dots & labels ──
  lec.iters.forEach((it, i) => {
    const x = xs[i];
    const sy = scoreY(it.score);
    const qy = qualY(it.quality);
    const wy = wordY(it.words);

    // score dot + label
    svg += `<circle cx="${x}" cy="${sy}" r="3.5" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>`;
    // Show score label on first and last
    if (i === 0 || i === n-1) {
      const anchor = (i === 0) ? 'start' : 'end';
      const dx = (i === 0) ? 5 : -5;
      svg += `<text x="${x+dx}" y="${sy-5}" text-anchor="${anchor}" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#58a6ff">${it.score.toFixed(2)}</text>`;
    }

    // quality dot
    svg += `<circle cx="${x}" cy="${qy}" r="2.8" fill="#0d1117" stroke="#d2a8ff" stroke-width="1.4"/>`;

    // words dot
    svg += `<circle cx="${x}" cy="${wy}" r="2.5" fill="#0d1117" stroke="#f78166" stroke-width="1.3" opacity="0.85"/>`;
  });

  // Y-axis labels (Score)
  [scoreMin, (scoreMin+scoreMax)/2, scoreMax].forEach(v => {
    const y = scoreY(v);
    svg += `<text x="${PAD_L-4}" y="${y+3}" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="7" fill="#8b949e">${v.toFixed(1)}</text>`;
  });

  svg += `</svg>`;
  return svg;
}

// ── Build cards ──
const grid = document.getElementById('grid');
data.forEach(lec => {
  const isPass = lec.stopReason.startsWith('pass');
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <span class="card-title">Lecture ${lec.id} &nbsp;·&nbsp; ${lec.iters.length} iters</span>
      <div class="card-final">
        <span class="final-score">${lec.finalScore.toFixed(4)}</span>
        <span class="stop-reason ${isPass ? 'stop-pass' : 'stop-stall'}">${lec.stopReason.split(':')[0].toUpperCase()}</span>
      </div>
    </div>
    <div class="chart-area">${mkSVG(lec)}</div>
  `;
  grid.appendChild(card);
});

// ── Summary rows ──
const sumContainer = document.getElementById('summary-rows');
const maxScore = Math.max(...data.map(d => d.finalScore));
data.forEach(lec => {
  const pct = (lec.finalScore / 1.0) * 100;
  const isPass = lec.stopReason.startsWith('pass');
  const color = isPass ? '#3fb950' : '#f78166';
  const row = document.createElement('div');
  row.className = 'summary-row';
  row.innerHTML = `
    <div class="summary-label">LEC ${lec.id}</div>
    <div class="bar-track">
      <div class="bar-fill" style="width:${pct}%;background:${color};"></div>
      <span class="bar-value" style="color:${color}">${lec.finalScore.toFixed(4)}</span>
      <span class="bar-iters">${lec.iters.length} iters &nbsp;·&nbsp; ${lec.stopReason}</span>
    </div>
  `;
  sumContainer.appendChild(row);
});
</script>
</body>
</html>
