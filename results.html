<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lecture Evaluation Metrics</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0d1117;
--surface:#161b22;
--surface2:#1c2330;
--border:#30363d;
--accent:#58a6ff;
--accent2:#3fb950;
--accent3:#f78166;
--accent4:#d2a8ff;
--text:#e6edf3;
--text-muted:#8b949e;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'IBM Plex Sans',sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
padding:32px 24px 48px;
}

.title-block{
text-align:center;
margin-bottom:36px;
}

.title-block h1{
font-family:'IBM Plex Mono',monospace;
font-size:11px;
font-weight:500;
letter-spacing:.2em;
color:var(--text-muted);
text-transform:uppercase;
margin-bottom:6px;
}

.title-block h2{
font-size:22px;
font-weight:600;
letter-spacing:-.02em;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
max-width:1300px;
margin:0 auto 36px;
}

.card{
background:var(--surface2);
border:1px solid var(--border);
border-radius:12px;
padding:20px 22px 18px;
}

.card-header{
display:flex;
align-items:baseline;
justify-content:space-between;
margin-bottom:16px;
}

.card-title{
font-family:'IBM Plex Mono',monospace;
font-size:11px;
font-weight:600;
letter-spacing:.18em;
color:var(--text-muted);
text-transform:uppercase;
white-space:nowrap;
}

.card-final{
display:flex;
align-items:center;
gap:8px;
}

.final-score{
font-family:'IBM Plex Mono',monospace;
font-size:18px;
font-weight:600;
color:var(--accent2);
}

.stop-reason{
font-family:'IBM Plex Mono',monospace;
font-size:8px;
letter-spacing:.08em;
padding:3px 7px;
border-radius:4px;
border:1px solid;
}

.stop-pass{color:var(--accent2);border-color:#3fb95044;background:#162318;}
.stop-stall{color:var(--accent3);border-color:#f7816644;background:#231a18;}

.chart-area{position:relative;width:100%;}
.chart-area svg{width:100%;height:auto;overflow:visible;}

.summary{
max-width:1300px;
margin:0 auto;
background:var(--surface2);
border:1px solid var(--border);
border-radius:12px;
padding:20px 28px;
}

.summary-title{
font-family:'IBM Plex Mono',monospace;
font-size:10px;
font-weight:600;
letter-spacing:.2em;
color:var(--text-muted);
text-transform:uppercase;
margin-bottom:16px;
}

.summary-row{
display:flex;
height:32px;
border-radius:6px;
overflow:hidden;
margin-bottom:10px;
border:1px solid var(--border);
}

.summary-label{
font-family:'IBM Plex Mono',monospace;
font-size:9px;
letter-spacing:.1em;
color:var(--text-muted);
background:var(--surface);
padding:0 12px;
display:flex;
align-items:center;
width:78px;
flex-shrink:0;
border-right:1px solid var(--border);
}

.bar-track{
flex:1;
background:var(--surface);
position:relative;
display:flex;
align-items:center;
}

.bar-fill{
height:100%;
position:absolute;
left:0;
top:0;
opacity:.22;
}

.bar-value{
position:relative;
font-family:'IBM Plex Mono',monospace;
font-size:10px;
font-weight:600;
padding:0 12px;
}

.bar-iters{
font-family:'IBM Plex Mono',monospace;
font-size:8px;
color:var(--text-muted);
padding-right:12px;
margin-left:auto;
white-space:nowrap;
display:flex;
align-items:center;
}

.legend{
display:flex;
flex-wrap:wrap;
gap:16px 28px;
margin-top:20px;
padding:12px 18px;
border:1px solid var(--border);
border-radius:8px;
background:var(--surface);
max-width:1300px;
margin-left:auto;
margin-right:auto;
}

.legend-item{
display:flex;
align-items:center;
gap:7px;
font-family:'IBM Plex Mono',monospace;
font-size:10px;
color:var(--text-muted);
}

.legend-dot{
width:10px;
height:10px;
border-radius:2px;
border:1.5px solid;
}

</style>
</head>

<body>

<div class="title-block">
<h1>Judge Evaluation Pipeline</h1>
<h2>Lecture Iteration Metrics</h2>
</div>

<div class="grid" id="grid"></div>

<div class="summary">
<div class="summary-title">Best Quality Scores — All Lectures</div>
<div id="summary-rows"></div>
</div>

<div class="legend">
<div class="legend-item">
<div class="legend-dot" style="border-color:#58a6ff;background:#58a6ff33;"></div>
Score (0–5)
</div>

<div class="legend-item">
<div class="legend-dot" style="border-color:#d2a8ff;background:#d2a8ff33;"></div>
Quality (0–1)
</div>

<div class="legend-item">
<div class="legend-dot" style="border-color:#f78166;background:#f7816633;"></div>
Word Count
</div>

<div class="legend-item">
<div class="legend-dot" style="border-color:#3fb950;background:#3fb95033;"></div>
Pass
</div>

<div class="legend-item">
<div class="legend-dot" style="border-color:#f78166;background:#f7816633;"></div>
Stalled
</div>
</div>

<script>

const data=[
{ id:1, stopReason:'stalled: trend plateaued', iters:[
{score:4.30,quality:0.8394,words:319},
{score:4.44,quality:0.8609,words:386},
{score:4.46,quality:0.8410,words:378},
{score:4.36,quality:0.8359,words:367}]},

{ id:2, stopReason:'pass: strict thresholds met', iters:[
{score:4.56,quality:0.8811,words:300},
{score:4.40,quality:0.8581,words:366},
{score:4.44,quality:0.8843,words:392},
{score:4.54,quality:0.8707,words:401},
{score:4.40,quality:0.8340,words:382}]},

{ id:3, stopReason:'stalled: trend plateaued', iters:[
{score:4.32,quality:0.7621,words:288},
{score:4.40,quality:0.8024,words:385},
{score:4.40,quality:0.7659,words:355},
{score:4.34,quality:0.7891,words:355}]},

{ id:4, stopReason:'pass: high quality plateau', iters:[
{score:4.40,quality:0.8231,words:306},
{score:4.34,quality:0.8437,words:370},
{score:4.32,quality:0.8292,words:379},
{score:4.40,quality:0.8351,words:382}]},

{ id:5, stopReason:'stalled: trend plateaued', iters:[
{score:4.30,quality:0.8032,words:306},
{score:4.30,quality:0.8179,words:373},
{score:4.40,quality:0.8326,words:373},
{score:4.34,quality:0.8041,words:395}]},

{ id:6, stopReason:'pass: high quality plateau', iters:[
{score:4.34,quality:0.7764,words:290},
{score:4.40,quality:0.7969,words:363},
{score:4.48,quality:0.8121,words:359},
{score:4.34,quality:0.7995,words:376}]},

{ id:7, stopReason:'stalled: trend plateaued', iters:[
{score:4.44,quality:0.8061,words:286},
{score:4.52,quality:0.8059,words:378},
{score:4.50,quality:0.8083,words:367},
{score:4.50,quality:0.8269,words:366},
{score:4.48,quality:0.8063,words:346}]},
];

const grid=document.getElementById("grid");

data.forEach(lec=>{

const bestIdx=lec.iters.reduce((bi,it,i)=>it.quality>lec.iters[bi].quality?i:bi,0);
const bestScore=lec.iters[bestIdx].quality;

const isPass=lec.stopReason.startsWith("pass");

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="card-header">
<span class="card-title">Lecture ${lec.id} &nbsp;·&nbsp; ${lec.iters.length}&nbsp;ITERS</span>

<div class="card-final">
<span class="final-score">${bestScore.toFixed(4)}</span>
<span class="stop-reason ${isPass?"stop-pass":"stop-stall"}">
${isPass?"PASS":"STALLED"}
</span>
</div>
</div>

<div class="chart-area">Iteration chart</div>
`;

grid.appendChild(card);
});

const sumContainer=document.getElementById("summary-rows");

data.forEach(lec=>{

const bestIdx=lec.iters.reduce((bi,it,i)=>it.quality>lec.iters[bi].quality?i:bi,0);
const bestScore=lec.iters[bestIdx].quality;

const pct=bestScore*100;

const isPass=lec.stopReason.startsWith("pass");

const color=isPass?"#3fb950":"#f78166";

const row=document.createElement("div");
row.className="summary-row";

row.innerHTML=`
<div class="summary-label">LEC ${lec.id}</div>

<div class="bar-track">
<div class="bar-fill" style="width:${pct}%;background:${color};"></div>

<span class="bar-value" style="color:${color}">
${bestScore.toFixed(4)}
</span>

<span class="bar-iters">${lec.iters.length}&nbsp;ITERS</span>
</div>
`;

sumContainer.appendChild(row);

});

</script>

</body>
</html>
