<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lecture Evaluation Metrics</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #f78166;
    --accent4: #d2a8ff;
    --text: #e6edf3;
    --text-muted: #8b949e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px 48px;
  }
  .title-block { text-align: center; margin-bottom: 36px; }
  .title-block h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 500; letter-spacing: 0.2em;
    color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px;
  }
  .title-block h2 {
    font-size: 22px; font-weight: 600;
    color: var(--text); letter-spacing: -0.02em;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    max-width: 1300px;
    margin: 0 auto 36px;
  }
  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px 18px;
  }
  .card-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .card-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 600; letter-spacing: 0.18em;
    color: var(--text-muted); text-transform: uppercase;
  }
  .card-final { display: flex; align-items: center; gap: 8px; }
  .final-score {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px; font-weight: 600; color: var(--accent2);
  }
  .stop-reason {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px; letter-spacing: 0.08em;
    padding: 3px 7px; border-radius: 4px; border: 1px solid;
  }
  .stop-pass  { color: var(--accent2); border-color: #3fb95044; background: #162318; }
  .stop-stall { color: var(--accent3); border-color: #f7816644; background: #231a18; }
  .chart-area { position: relative; width: 100%; }
  .chart-area svg { width: 100%; height: auto; overflow: visible; }
  .summary {
    max-width: 1300px; margin: 0 auto;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 28px;
  }
  .summary-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600; letter-spacing: 0.2em;
    color: var(--text-muted); text-transform: uppercase; margin-bottom: 16px;
  }
  .summary-row {
    display: flex;
    align-items: stretch;
    height: 32px;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }
  .summary-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; letter-spacing: 0.1em; color: var(--text-muted);
    background: var(--surface); padding: 0 12px;
    display: flex; align-items: center;
    width: 78px; flex-shrink: 0;
    border-right: 1px solid var(--border);
  }
  .bar-track {
    flex: 1; min-width: 0;
    background: var(--surface);
    position: relative;
    display: flex; align-items: center;
  }
  .bar-fill {
    height: 100%; position: absolute; left: 0; top: 0; opacity: 0.22;
  }
  .bar-value {
    position: relative;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600;
    padding: 0 12px; flex-shrink: 0;
  }
  .bar-iters {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px; color: var(--text-muted);
    padding-right: 12px; margin-left: auto;
    white-space: nowrap; flex-shrink: 0;
  }
  .legend {
    display: flex; flex-wrap: wrap; gap: 16px 28px;
    margin-top: 20px; padding: 12px 18px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface);
    max-width: 1300px; margin-left: auto; margin-right: auto;
  }
  .legend-item {
    display: flex; align-items: center; gap: 7px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: var(--text-muted); letter-spacing: 0.05em;
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 2px;
    border: 1.5px solid; flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="title-block">
  <h1>Judge Evaluation Pipeline</h1>
  <h2>Lecture Iteration Metrics</h2>
</div>

<div class="grid" id="grid"></div>

<div class="summary">
  <div class="summary-title">Final Scores — All Lectures</div>
  <div id="summary-rows"></div>
</div>

<div class="legend" style="margin-top:20px;">
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#58a6ff;background:#58a6ff33;"></div>
    Rubric Score (1–5)
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#d2a8ff;background:#d2a8ff33;"></div>
    Quality (0–1)
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#3fb950;background:#3fb95033;"></div>
    pass
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="border-color:#f78166;background:#f7816633;"></div>
    stalled
  </div>
  <div style="width:100%;margin-top:6px;padding-top:10px;border-top:1px solid #30363d;font-family:'IBM Plex Mono',monospace;font-size:9px;color:#8b949e;letter-spacing:0.06em;">
    NOTE: quality scores (0–1) are multiplied by 5 to normalize to the 1–5 display axis.
  </div>
</div>

<script>
const data = [
  {
    id: 1,
    iters: [
      { score: 4.30, quality: 0.8394, words: 319 },
      { score: 4.44, quality: 0.8609, words: 386 },
      { score: 4.46, quality: 0.8410, words: 378 },
      { score: 4.36, quality: 0.8359, words: 367 },
    ],
    stopReason: 'stalled: trend plateaued',
  },
  {
    id: 2,
    iters: [
      { score: 4.56, quality: 0.8811, words: 300 },
      { score: 4.40, quality: 0.8581, words: 366 },
      { score: 4.44, quality: 0.8843, words: 392 },
      { score: 4.54, quality: 0.8707, words: 401 },
      { score: 4.40, quality: 0.8340, words: 382 },
    ],
    stopReason: 'pass: strict thresholds met',
  },
  {
    id: 3,
    iters: [
      { score: 4.34, quality: 0.7536, words: 288 },
      { score: 4.40, quality: 0.7614, words: 367 },
      { score: 4.40, quality: 0.7443, words: 352 },
      { score: 4.22, quality: 0.7392, words: 368 },
      { score: 4.44, quality: 0.7667, words: 373 },
      { score: 4.34, quality: 0.7696, words: 353 },
      { score: 4.32, quality: 0.7816, words: 344 },
    ],
    stopReason: 'pass: high quality plateau',
  },
  {
    id: 4,
    iters: [
      { score: 4.40, quality: 0.8231, words: 306 },
      { score: 4.34, quality: 0.8437, words: 370 },
      { score: 4.32, quality: 0.8292, words: 379 },
      { score: 4.40, quality: 0.8351, words: 382 },
    ],
    stopReason: 'pass: high quality plateau',
  },
  {
    id: 5,
    iters: [
      { score: 4.30, quality: 0.8032, words: 306 },
      { score: 4.30, quality: 0.8179, words: 373 },
      { score: 4.40, quality: 0.8326, words: 373 },
      { score: 4.34, quality: 0.8041, words: 395 },
    ],
    stopReason: 'stalled: trend plateaued',
  },
  {
    id: 6,
    iters: [
      { score: 4.34, quality: 0.7764, words: 290 },
      { score: 4.40, quality: 0.7969, words: 363 },
      { score: 4.48, quality: 0.8121, words: 359 },
      { score: 4.34, quality: 0.7995, words: 376 },
    ],
    stopReason: 'pass: high quality plateau',
  },
  {
    id: 7,
    iters: [
      { score: 4.44, quality: 0.8061, words: 286 },
      { score: 4.52, quality: 0.8059, words: 378 },
      { score: 4.50, quality: 0.8083, words: 367 },
      { score: 4.50, quality: 0.8269, words: 366 },
      { score: 4.48, quality: 0.8063, words: 346 },
    ],
    stopReason: 'stalled: trend plateaued',
  },
];

const W = 380, H = 168;
const PAD_L = 36, PAD_R = 12, PAD_T = 12, PAD_B = 36;
const CW = W - PAD_L - PAD_R;
const CH = H - PAD_T - PAD_B;

function bestIdx(lec) {
  return lec.iters.reduce((bi, it, i) => it.quality > lec.iters[bi].quality ? i : bi, 0);
}

function mkSVG(lec) {
  const n = lec.iters.length;
  const xs = lec.iters.map((_, i) => PAD_L + (i / (n - 1 || 1)) * CW);

  const scoreMin = 0, scoreMax = 5;
  const scoreY = v => PAD_T + CH - ((v - scoreMin) / (scoreMax - scoreMin)) * CH;

  // Scale quality to 1–5 by multiplying by 5
  const qualY = v => scoreY(v * 5);

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gS${lec.id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gQ${lec.id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d2a8ff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#d2a8ff" stop-opacity="0"/>
    </linearGradient>
  </defs>`;

  // Grid lines aligned to y-axis values
  [1, 2, 3, 4, 5].forEach(v => {
    const y = scoreY(v);
    svg += `<line x1="${PAD_L}" y1="${y}" x2="${W - PAD_R}" y2="${y}" stroke="#30363d" stroke-width="0.8"/>`;
  });

  // Vertical iter lines + labels
  xs.forEach((x, i) => {
    svg += `<line x1="${x}" y1="${PAD_T}" x2="${x}" y2="${PAD_T + CH}" stroke="#30363d" stroke-width="0.6" stroke-dasharray="2 2"/>`;
    svg += `<text x="${x}" y="${PAD_T + CH + 11}" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7.5" fill="#8b949e">I${i + 1}</text>`;
  });

  // Fill areas
  const areaPath = (fn) => `M${xs[0]},${PAD_T + CH} ` + xs.map((x, i) => `L${x},${fn(lec.iters[i])}`).join(' ') + ` L${xs[xs.length - 1]},${PAD_T + CH} Z`;
  svg += `<path d="${areaPath(it => scoreY(it.score))}" fill="url(#gS${lec.id})"/>`;
  svg += `<path d="${areaPath(it => qualY(it.quality))}" fill="url(#gQ${lec.id})"/>`;

  // Lines
  const linePath = (fn) => xs.map((x, i) => (i === 0 ? 'M' : 'L') + x + ',' + fn(lec.iters[i])).join(' ');
  svg += `<path d="${linePath(it => scoreY(it.score))}" fill="none" stroke="#58a6ff" stroke-width="1.8"/>`;
  svg += `<path d="${linePath(it => qualY(it.quality))}" fill="none" stroke="#d2a8ff" stroke-width="1.5" stroke-dasharray="4 2"/>`;

  // Dots & score labels on first/last
  lec.iters.forEach((it, i) => {
    const x = xs[i];
    const sy = scoreY(it.score);
    const qy = qualY(it.quality);
    svg += `<circle cx="${x}" cy="${sy}" r="3.5" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>`;
    if (i === 0 || i === n - 1) {
      const anchor = i === 0 ? 'start' : 'end';
      const dx = i === 0 ? 5 : -5;
      svg += `<text x="${x + dx}" y="${sy - 5}" text-anchor="${anchor}" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#58a6ff">${it.score.toFixed(2)}</text>`;
    }
    svg += `<circle cx="${x}" cy="${qy}" r="2.8" fill="#0d1117" stroke="#d2a8ff" stroke-width="1.4"/>`;
  });

  // Y-axis labels
  [1, 2, 3, 4, 5].forEach(v => {
    svg += `<text x="${PAD_L - 4}" y="${scoreY(v) + 3}" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="7" fill="#8b949e">${v}</text>`;
  });

  // SELECTED marker on best quality iteration
  const bi = bestIdx(lec);
  const bx = xs[bi];
  svg += `<line x1="${bx}" y1="${PAD_T}" x2="${bx}" y2="${PAD_T + CH}" stroke="#3fb950" stroke-width="1.2" opacity="0.6"/>`;
  svg += `<rect x="${bx - 22}" y="${PAD_T + CH + 16}" width="44" height="13" rx="3" fill="#162318" stroke="#3fb95066" stroke-width="1"/>`;
  svg += `<text x="${bx}" y="${PAD_T + CH + 26}" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7.5" fill="#3fb950">SELECTED</text>`;

  svg += `</svg>`;
  return svg;
}

// Build cards
const grid = document.getElementById('grid');
data.forEach(lec => {
  const isPass = lec.stopReason.startsWith('pass');
  const bi = bestIdx(lec);
  const best = lec.iters[bi].quality;
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <span class="card-title">Lecture ${lec.id}</span>
      <div class="card-final">
        <span class="final-score">${best.toFixed(4)}</span>
        <span class="stop-reason ${isPass ? 'stop-pass' : 'stop-stall'}">${lec.stopReason.split(':')[0].toUpperCase()}</span>
      </div>
    </div>
    <div class="chart-area">${mkSVG(lec)}</div>
  `;
  grid.appendChild(card);
});

// Summary rows
const sumContainer = document.getElementById('summary-rows');
data.forEach(lec => {
  const isPass = lec.stopReason.startsWith('pass');
  const bi = bestIdx(lec);
  const best = lec.iters[bi].quality;
  const pct = best * 100;
  const color = isPass ? '#3fb950' : '#f78166';
  const row = document.createElement('div');
  row.className = 'summary-row';
  row.innerHTML = `
    <div class="summary-label">LEC ${lec.id}</div>
    <div class="bar-track">
      <div class="bar-fill" style="width:${pct}%;background:${color};"></div>
      <span class="bar-value" style="color:${color}">${best.toFixed(4)}</span>
      <span class="bar-iters"></span>
    </div>
  `;
  sumContainer.appendChild(row);
});
</script>
</body>
</html>
